services:
  testserver:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/go-runtime-metrics-server/Dockerfile
    image: hatest-testserver-go-runtime-metrics
    ports:
      - "${TEST_SERVICE_PORTS}"
    environment:
      - GOMEMLIMIT=512MiB
    depends_on:
      otelcol:
        condition: service_started

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-go-runtime-metrics:/var/run/obi
      - /sys/kernel/tracing:/sys/kernel/tracing:rw
    image: hatest-obi
    privileged: true
    pid: "host"
    environment:
      OTEL_EBPF_CONFIG_PATH: /configs/obi-config-go-runtime-metrics.yml
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_DISCOVERY_POLL_INTERVAL: 500ms
      OTEL_EBPF_SERVICE_NAMESPACE: "integration-test"
      OTEL_EBPF_METRICS_INTERVAL: "10ms"
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "obi"
      OTEL_EBPF_PROCESSES_INTERVAL: "100ms"
      OTEL_EBPF_OPEN_PORT: "8080"
      OTEL_EBPF_METRICS_FEATURES: "application_runtime"
      OTEL_EBPF_PROMETHEUS_PORT: "8999"
      OTEL_EBPF_PROMETHEUS_TTL: "250ms"
    depends_on:
      testserver:
        condition: service_started
    ports:
      - "${OTEL_EBPF_PROMETHEUS_HOST_PORT:-8999}:8999"

  prometheus:
    image: quay.io/prometheus/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config-promscrape.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"

  # OpenTelemetry Collector
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.153.0@sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config-weaver-no-jaeger.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317" # OTLP over gRPC receiver
      - "4318:4318" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      prometheus:
        condition: service_started
      weaver:
        condition: service_healthy

  weaver:
    extends:
      file: components/weaver/service.yml
      service: weaver
    volumes:
      - ../../../schemas/obi:/obi-registry:ro
